services:
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
      network: host
    volumes:
      - ./back:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
      - 1.1.1.1

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      network: host
    volumes:
      - ./front:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    dns:
      - 8.8.8.8
      - 1.1.1.1
