  #   # 'ports' são ignorados em network_mode: host, pois já mapeia para as portas nativas
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
      network: host # Usa a rede do host durante o build (instalação de pacotes)
    network_mode: host
    volumes:
      - ./back:/app
    environment:
      - DEBUG=1
      - PYTHONUNBUFFERED=1
      # - USE_MYSQL=1 # Descomente para usar MySQL
      # - DB_NAME=db_printii
      # - DB_USER=root
      # - DB_PASSWORD=root
      # - DB_HOST=127.0.0.1
      # - DB_PORT=3306
    # depends_on:
    #   db:
    #     condition: service_healthy

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      network: host
    network_mode: host
    volumes:
      - ./front:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

